<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <!-- Font Awesome CDN - already included -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        color: #333;
        line-height: 1.6;
        padding: 0 1rem;
        /* Added padding for better spacing on smaller screens */
        background-image: url(2background.avif);
        background-repeat: no-repeat;
        background-position: center;
        background-attachment: fixed;
        background-size: cover;
    }

    header {
        background-color: #ffffff;
        padding: 1rem 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 2rem;
        /* Added space below header */
    }

    nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        /* Allows nav items to wrap */
        justify-content: center;
        /* Center nav items */
    }

    nav ul li {
        margin: 0.5rem 1rem;
        /* Adjusted margin for better spacing */
    }

    nav ul li:first-child {
        margin-left: 0;
    }

    nav ul li a {
        text-decoration: none;
        color: #555;
        font-weight: 500;
        font-size: 1rem;
        padding: 0.5rem 0.8rem;
        border-radius: 4px;
        transition: background-color 0.3s ease, color 0.3s ease;
        display: flex;
        align-items: center;
    }

    nav ul li a i {
        margin-right: 0.6rem;
        font-size: 1.1rem;
    }

    nav ul li a:hover {
        background-color: #e0e7ef;
        color: #0056b3;
    }

    /* --- Booth Gallery Styles --- */
    h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #0056b3;
        /* A bit more prominent heading color */
    }

    .booth-gallery {
        display: grid;
        /* Default: 4 columns for larger screens */
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
        /* Spacing between grid items */
        max-width: 1200px;
        /* Max width for the gallery */
        margin: 0 auto;
        /* Center the gallery */
        padding: 0 1rem;
        /* Padding for smaller screens */
    }

    .booth-item {
        text-decoration: none;
        display: block;
        /* Make the link a block element */
        text-align: center;
        background-color: #fff;
        /* White background for each booth card */
        border-radius: 8px;
        overflow: hidden;
        /* Ensures rounded corners clip the image */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        /* Softer shadow */
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        padding-bottom: 1rem;
        /* Space for potential captions */
    }

    .booth-item:hover {
        transform: translateY(-8px);
        /* Lift effect on hover */
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
        /* Enhanced shadow on hover */
    }

    .booth-item img {
        width: 100%;
        height: 180px;
        /* Fixed height for images */
        object-fit: cover;
        /* Cover the area, maintain aspect ratio */
        display: block;
        /* Remove extra space below image */
        border-bottom: 1px solid #eee;
        /* Separator line */
        margin-bottom: 0.8rem;
        /* Space between image and text */
    }

    .booth-item span {
        /* Style for potential text/caption */
        font-weight: 500;
        color: #333;
        font-size: 1rem;
    }

    /* Responsive Adjustments */
    @media (max-width: 992px) {
        .booth-gallery {
            grid-template-columns: repeat(3, 1fr);
            /* 3 columns on medium screens */
        }
    }

    @media (max-width: 768px) {
        .booth-gallery {
            grid-template-columns: repeat(2, 1fr);
            /* 2 columns on smaller screens */
        }

        .booth-item img {
            height: 150px;
            /* Adjust image height for smaller screens */
        }
    }

    @media (max-width: 576px) {
        .booth-gallery {
            grid-template-columns: 1fr;
            /* 1 column on very small screens */
            gap: 1rem;
        }

        .booth-item img {
            height: 200px;
            /* Make image larger on single column layout */
        }

        header {
            flex-direction: column;
            text-align: center;
        }

        nav ul {
            flex-direction: column;
            margin-top: 1rem;
        }

        nav ul li {
            margin: 0.5rem 0;
        }
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="..//home.html"><i class="fas fa-home"></i>Home</a></li>
            </ul>
        </nav>
    </header>

    <h1>Booths</h1>

    <div class="booth-gallery">
        <a href="boothsinfo/booth1.html" class="booth-item">
            <img src="booth1.jpg" alt="Booth1">
            <span>Booth 1</span>
        </a>
        <a href="boothsinfo/booth2.html" class="booth-item">
            <img src="booth2.webp" alt="Booth2">
            <span>Booth 2</span>
        </a>
        <a href="boothsinfo/booth3.html" class="booth-item">
            <img src="booth3.webp" alt="Booth3">
            <span>Booth 3</span>
        </a>
        <a href="boothsinfo/booth4.html" class="booth-item">
            <img src="booth4.webp" alt="Booth4">
            <span>Booth 4</span>
        </a>
        <a href="boothsinfo/booth5.html" class="booth-item">
            <img src="booth5.avif" alt="Booth5">
            <span>Booth 5</span>
        </a>
        <a href="boothsinfo/booth6.html" class="booth-item">
            <img src="booth6.webp" alt="Booth6">
            <span>Booth 6</span>
        </a>
        <a href="boothsinfo/booth7.html" class="booth-item">
            <img src="booth7.jfif" alt="Booth7">
            <span>Booth 7</span>
        </a>
        <a href="boothsinfo/booth8.html" class="booth-item">
            <img src="booth8.avif" alt="Booth8">
            <span>Booth 8</span>
        </a>
    </div>

    <script src="script.js"></script>
</body>

</html>
